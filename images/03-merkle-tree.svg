<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
<rect width="900" height="560" fill="#fafafa"/>
<text x="450.0" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">dm-verity hashtree with 64 MiB rootfs example (16384 × 4 KiB data blocks)</text>
<rect x="360" y="60" width="180" height="44" fill="#7a5a3a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="450" y="80" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">root_digest</text>
<text x="450" y="96" font-size="10" font-weight="400" fill="#e8e8e8" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">32 B · pinned in vbmeta</text>
<text x="560" y="78" font-size="11" font-weight="400" fill="#666" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">= SHA-256( salt ‖ L1 block 0 )</text>
<text x="560" y="94" font-size="10" font-weight="400" fill="#666" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">pinned at build time, enforced on every read</text>
<rect x="340" y="160" width="220" height="40" fill="#3a6d6d" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="450" y="177" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">LEVEL 1  ·  1 hash block (4 KiB)</text>
<text x="450" y="193" font-size="10" font-weight="400" fill="#e8e8e8" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">128 hashes covering all L0 blocks</text>
<line x1="450" y1="104" x2="450" y2="160" stroke="#1a1a1a" stroke-width="1.5"/>
<rect x="180" y="260" width="140" height="50" fill="#3a6d6d" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="250.0" y="280" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">L0 block 0</text>
<text x="250.0" y="296" font-size="10" font-weight="400" fill="#e8e8e8" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">128 hashes</text>
<line x1="450" y1="200" x2="250.0" y2="260" stroke="#1a1a1a" stroke-width="1"/>
<rect x="390" y="260" width="140" height="50" fill="#3a6d6d" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="460.0" y="280" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">L0 block 1</text>
<text x="460.0" y="296" font-size="10" font-weight="400" fill="#e8e8e8" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">128 hashes</text>
<line x1="450" y1="200" x2="460.0" y2="260" stroke="#1a1a1a" stroke-width="1"/>
<rect x="600" y="260" width="140" height="50" fill="#3a6d6d" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="670.0" y="280" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">L0 block 127</text>
<text x="670.0" y="296" font-size="10" font-weight="400" fill="#e8e8e8" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">128 hashes</text>
<line x1="450" y1="200" x2="670.0" y2="260" stroke="#1a1a1a" stroke-width="1"/>
<text x="565.0" y="290" font-size="20" font-weight="400" fill="#666" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">…</text>
<rect x="180" y="360" width="140" height="60" fill="#3a5f7a" stroke="#2a2a2a" stroke-width="1.2" rx="3" stroke-dasharray="4,3"/>
<text x="250.0" y="382" font-size="10" font-weight="400" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">data blk 0 …</text>
<text x="250.0" y="398" font-size="10" font-weight="400" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">data blk 127</text>
<text x="250.0" y="412" font-size="9" font-weight="400" fill="#ddd" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">(4 KiB each)</text>
<line x1="250.0" y1="310" x2="250.0" y2="360" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
<rect x="390" y="360" width="140" height="60" fill="#3a5f7a" stroke="#2a2a2a" stroke-width="1.2" rx="3" stroke-dasharray="4,3"/>
<text x="460.0" y="382" font-size="10" font-weight="400" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">data blk 128 …</text>
<text x="460.0" y="398" font-size="10" font-weight="400" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">data blk 255</text>
<text x="460.0" y="412" font-size="9" font-weight="400" fill="#ddd" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">(4 KiB each)</text>
<line x1="460.0" y1="310" x2="460.0" y2="360" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
<rect x="600" y="360" width="140" height="60" fill="#3a5f7a" stroke="#2a2a2a" stroke-width="1.2" rx="3" stroke-dasharray="4,3"/>
<text x="670.0" y="382" font-size="10" font-weight="400" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">data blk 16256 …</text>
<text x="670.0" y="398" font-size="10" font-weight="400" fill="#ffffff" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">data blk 16383</text>
<text x="670.0" y="412" font-size="9" font-weight="400" fill="#ddd" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">(4 KiB each)</text>
<line x1="670.0" y1="310" x2="670.0" y2="360" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
<rect x="80" y="470" width="740" height="60" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1.2" rx="4"/>
<text x="100" y="492" font-size="11" font-weight="600" fill="#1a1a1a" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">Per-block hash:</text>
<text x="210" y="492" font-size="11" font-weight="400" fill="#1a1a1a" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">h(block) = SHA-256( salt ‖ block_contents )</text>
<text x="100" y="514" font-size="11" font-weight="600" fill="#1a1a1a" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">Fan-out:</text>
<text x="210" y="514" font-size="11" font-weight="400" fill="#1a1a1a" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">hash_block_size / digest_size  =  4096 / 32  =  128 children per hash block</text>
</svg>