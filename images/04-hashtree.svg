<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
<rect width="900" height="500" fill="#fafafa"/>
<text x="450.0" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">Hashtree on-disk layout  ·  64 MiB example</text>
<rect x="60" y="70" width="515" height="50" fill="#3a5f7a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="317.5" y="98" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">filesystem data  (64 MiB)</text>
<rect x="575" y="70" width="140" height="50" fill="#4a6d3a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="645.0" y="98" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">hashtree</text>
<rect x="715" y="70" width="78" height="50" fill="#7a5a3a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="754.0" y="98" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">vbmeta</text>
<rect x="793" y="70" width="23" height="50" fill="#9a9a9a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<rect x="816" y="70" width="23" height="50" fill="#7a3a5a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="827.5" y="98" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">ftr</text>
<text x="60" y="62" font-size="10" font-weight="400" fill="#666" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">hashtree is ~0.8 % of image size in practice</text>
<text x="60" y="138" font-size="10" font-weight="400" fill="#666" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">0</text>
<text x="575" y="138" font-size="10" font-weight="400" fill="#666" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">original_image_size</text>
<text x="715" y="138" font-size="10" font-weight="400" fill="#666" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">vbmeta_offset</text>
<text x="60" y="218" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">Hashtree region zoom  (129 × 4 KiB = 516 KiB)</text>
<rect x="60" y="230" width="40" height="70" fill="#7a5a3a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="80.0" y="263.0" font-size="10" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">L1</text>
<text x="80.0" y="277.0" font-size="9" font-weight="400" fill="#e8e8e8" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">1 blk</text>
<rect x="100" y="230" width="740" height="70" fill="#3a6d6d" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="470.0" y="263.0" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle" font-family="'Inter','Helvetica Neue',Arial,sans-serif">L0  ·  128 hash blocks</text>
<text x="470.0" y="279.0" font-size="10" font-weight="400" fill="#e8e8e8" text-anchor="middle" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">each covers 128 data blocks (= 512 KiB of rootfs)</text>
<line x1="575" y1="120" x2="60" y2="230" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
<line x1="715" y1="120" x2="840" y2="230" stroke="#666" stroke-width="1" stroke-dasharray="3,3"/>
<rect x="60" y="340" width="780" height="130" fill="#f0f0f0" stroke="#d0d0d0" stroke-width="1.2" rx="4"/>
<text x="80" y="364" font-size="12" font-weight="600" fill="#1a1a1a" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">Per-level arithmetic</text>
<text x="92" y="388" font-size="10.5" font-weight="400" fill="#1a1a1a" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">data blocks</text>
<text x="240" y="388" font-size="10.5" font-weight="600" fill="#1a1a1a" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">16 384</text>
<text x="440" y="388" font-size="10.5" font-weight="400" fill="#666" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">= image_size / 4096 = 64 MiB / 4 KiB</text>
<text x="92" y="406" font-size="10.5" font-weight="400" fill="#1a1a1a" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">level 0</text>
<text x="240" y="406" font-size="10.5" font-weight="600" fill="#1a1a1a" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">16 384 hashes → 128 blocks</text>
<text x="440" y="406" font-size="10.5" font-weight="400" fill="#666" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">one 4 KiB block packs 128 × 32 B hashes</text>
<text x="92" y="424" font-size="10.5" font-weight="400" fill="#1a1a1a" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">level 1</text>
<text x="240" y="424" font-size="10.5" font-weight="600" fill="#1a1a1a" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">128 hashes → 1 block</text>
<text x="440" y="424" font-size="10.5" font-weight="400" fill="#666" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">covers all L0 blocks</text>
<text x="92" y="442" font-size="10.5" font-weight="400" fill="#1a1a1a" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">root</text>
<text x="240" y="442" font-size="10.5" font-weight="600" fill="#1a1a1a" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">SHA-256( salt ‖ L1[0] )</text>
<text x="440" y="442" font-size="10.5" font-weight="400" fill="#666" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">stored in vbmeta as root_digest</text>
</svg>