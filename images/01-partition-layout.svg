<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 640" width="900" height="640" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
<rect width="900" height="640" fill="#fafafa"/>
<text x="450.0" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">AVB partition layout (footer mode, --partition_size 0)</text>
<rect x="80" y="70" width="520" height="150" fill="#3a5f7a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="98" y="96" font-size="14" font-weight="600" fill="#ffffff" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">Filesystem data</text>
<text x="98" y="116" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">ext4 / squashfs / erofs …</text>
<line x1="600" y1="70" x2="612" y2="70" stroke="#666" stroke-width="1" stroke-dasharray="2,2"/>
<text x="618" y="74" font-size="10" font-weight="400" fill="#666" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">0</text>
<rect x="80" y="224" width="520" height="110" fill="#4a6d3a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="98" y="250" font-size="14" font-weight="600" fill="#ffffff" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">Hashtree</text>
<text x="98" y="270" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">dm-verity Merkle tree</text>
<line x1="600" y1="224" x2="612" y2="224" stroke="#666" stroke-width="1" stroke-dasharray="2,2"/>
<text x="618" y="228" font-size="10" font-weight="400" fill="#666" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">original_image_size</text>
<rect x="80" y="338" width="520" height="110" fill="#7a5a3a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="98" y="364" font-size="14" font-weight="600" fill="#ffffff" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">VBMeta struct</text>
<text x="98" y="384" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">header + auth block + aux block</text>
<line x1="600" y1="338" x2="612" y2="338" stroke="#666" stroke-width="1" stroke-dasharray="2,2"/>
<text x="618" y="342" font-size="10" font-weight="400" fill="#666" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">vbmeta_offset</text>
<rect x="80" y="452" width="520" height="35" fill="#9a9a9a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="98" y="478" font-size="14" font-weight="600" fill="#ffffff" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">Zero padding</text>
<text x="98" y="498" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">to 4 KiB boundary</text>
<line x1="600" y1="452" x2="612" y2="452" stroke="#666" stroke-width="1" stroke-dasharray="2,2"/>
<text x="618" y="456" font-size="10" font-weight="400" fill="#666" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">vbmeta_offset + vbmeta_size</text>
<rect x="80" y="491" width="520" height="50" fill="#7a3a5a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="98" y="517" font-size="14" font-weight="600" fill="#ffffff" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">AVB footer (64 B)</text>
<text x="98" y="537" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">magic 'AVBf' · vbmeta_offset · vbmeta_size</text>
<line x1="600" y1="491" x2="612" y2="491" stroke="#666" stroke-width="1" stroke-dasharray="2,2"/>
<text x="618" y="495" font-size="10" font-weight="400" fill="#666" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">(end of last 4 KiB block) − 64</text>
<line x1="600" y1="541" x2="612" y2="541" stroke="#666" stroke-width="1" stroke-dasharray="2,2"/>
<text x="618" y="545" font-size="10" font-weight="400" fill="#666" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">end of image</text>
<text x="80" y="585" font-size="11" font-weight="400" fill="#666" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">When written to a block device larger than the signed image, trailing zeros push the footer</text>
<text x="80" y="601" font-size="11" font-weight="400" fill="#666" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">past the end. avb_verify detects this by reading the filesystem superblock and scanning</text>
<text x="80" y="617" font-size="11" font-weight="400" fill="#666" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">forward in 1 MiB chunks from the filesystem boundary.</text>
</svg>