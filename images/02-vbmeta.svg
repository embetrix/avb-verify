<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 740" width="860" height="740" font-family="'Inter','Helvetica Neue',Arial,sans-serif">
<rect width="860" height="740" fill="#fafafa"/>
<text x="430.0" y="28" text-anchor="middle" font-size="16" font-weight="600" fill="#1a1a1a">VBMeta struct signed metadata that pins the root hash</text>
<rect x="60" y="60" width="740" height="160" fill="#5a4a7a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="78" y="86" font-size="13" font-weight="600" fill="#ffffff" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">HEADER  (256 B, fixed layout)</text>
<text x="92" y="114" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">magic              "AVB0"</text>
<text x="92" y="129" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">required_libavb_version</text>
<text x="92" y="144" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">algorithm_type     SHA256_RSA4096, MLDSA65, …</text>
<text x="92" y="159" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">hash / signature offsets + sizes</text>
<text x="92" y="174" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">public_key offset + size</text>
<text x="92" y="189" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">descriptors offset + size</text>
<text x="92" y="204" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">rollback_index · flags</text>
<rect x="60" y="228" width="740" height="90" fill="#7a5a3a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="78" y="254" font-size="13" font-weight="600" fill="#ffffff" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">AUTHENTICATION BLOCK</text>
<text x="92" y="276" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">hash        SHA over header + aux block</text>
<text x="92" y="292" font-size="11" font-weight="400" fill="#e8e8e8" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">signature   PKCS#1 over that hash   ← libavb verifies this</text>
<rect x="60" y="326" width="740" height="360" fill="#7a5a3a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="78" y="352" font-size="13" font-weight="600" fill="#ffffff" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">AUXILIARY BLOCK</text>
<rect x="80" y="370" width="700" height="32" fill="#5a4a7a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="92" y="390" font-size="11" font-weight="400" fill="#ffffff" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">public_key    AVB serialized format (not PEM)</text>
<rect x="80" y="408" width="700" height="28" fill="#5a4a7a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="92" y="427" font-size="11" font-weight="400" fill="#ffffff" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">public_key_metadata    opaque, optional</text>
<text x="92" y="459" font-size="12" font-weight="600" fill="#ffffff" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">descriptors</text>
<rect x="100" y="470" width="660" height="128" fill="#4a6d3a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="116" y="492" font-size="12" font-weight="600" fill="#ffffff" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">HASHTREE_DESCRIPTOR</text>
<text x="132" y="510" font-size="10.5" font-weight="400" fill="#f0f0f0" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">image_size · tree_offset · tree_size</text>
<text x="132" y="523" font-size="10.5" font-weight="400" fill="#f0f0f0" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">data_block_size    4096</text>
<text x="132" y="536" font-size="10.5" font-weight="400" fill="#f0f0f0" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">hash_block_size    4096</text>
<text x="132" y="549" font-size="10.5" font-weight="400" fill="#f0f0f0" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">hash_algorithm     "sha256"</text>
<text x="132" y="562" font-size="10.5" font-weight="400" fill="#f0f0f0" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">partition_name     "system"</text>
<text x="132" y="575" font-size="10.5" font-weight="400" fill="#f0f0f0" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">salt               ← pinned, part of every block hash</text>
<text x="132" y="588" font-size="10.5" font-weight="400" fill="#f0f0f0" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">root_digest        ← THIS is what dm-verity enforces</text>
<rect x="100" y="610" width="660" height="64" fill="#7a3a5a" stroke="#2a2a2a" stroke-width="1.2" rx="3"/>
<text x="116" y="630" font-size="12" font-weight="600" fill="#ffffff" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">PROPERTY_DESCRIPTOR</text>
<text x="132" y="648" font-size="10.5" font-weight="400" fill="#f0f0f0" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">key     "roothash_sig"</text>
<text x="132" y="664" font-size="10.5" font-weight="400" fill="#f0f0f0" text-anchor="start" font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace">value   PKCS#7( root_digest )   ← add_key(2) → kernel keyring</text>
<text x="60" y="714" font-size="11" font-weight="400" fill="#666" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">The auth-block signature covers the header AND the entire aux block. Once libavb</text>
<text x="60" y="730" font-size="11" font-weight="400" fill="#666" text-anchor="start" font-family="'Inter','Helvetica Neue',Arial,sans-serif">verifies it against your trusted pubkey, root_digest and roothash_sig are trusted transitively.</text>
</svg>