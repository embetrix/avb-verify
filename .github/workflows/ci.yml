name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake e2fsprogs erofs-utils squashfs-tools python3 openssl

      - name: Build
        run: cmake -B build && cmake --build build

      - name: Test
        run: ctest --test-dir build -V
